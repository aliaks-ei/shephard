name: Codex Docs Review

on:
  pull_request:
    branches: [main, dev]
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: codex-doc-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review_docs_drift:
    name: Review docs drift
    if: ${{ github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout pull request merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/pull/${{ github.event.pull_request.number }}/head

      - name: Run Codex docs review
        id: run_codex
        uses: openai/codex-action@v1
        env:
          CODEX_DOC_PR_NUMBER: ${{ github.event.pull_request.number }}
          CODEX_DOC_BASE_REF: ${{ github.event.pull_request.base.ref }}
          CODEX_DOC_DIFF_RANGE: origin/${{ github.event.pull_request.base.ref }}...refs/remotes/pull/${{ github.event.pull_request.number }}/head
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/docs-review.md
          output-file: codex-doc-review-output.json
          safety-strategy: drop-sudo
          sandbox: read-only

      - name: Render docs review comment
        id: render
        run: node scripts/render-codex-doc-review-comment.mjs codex-doc-review-output.json codex-doc-review-comment.md

      - name: Upsert docs review comment
        uses: actions/github-script@v7
        env:
          REVIEW_COMMENT_PATH: codex-doc-review-comment.md
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('node:fs')
            const marker = '<!-- codex-doc-review -->'
            const body = fs.readFileSync(process.env.REVIEW_COMMENT_PATH, 'utf8')
            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })
            const existing = comments.find((comment) => {
              return comment.user?.type === 'Bot' && comment.body?.includes(marker)
            })

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }

      - name: Append job summary
        run: cat codex-doc-review-comment.md >> "$GITHUB_STEP_SUMMARY"
